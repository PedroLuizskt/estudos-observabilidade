worker_processes 4;

events {
    worker_connections 512;
}

http {
    # upstream dá nome ao serviço interno;
    # útil para, no futuro, adicionar múltiplas instâncias de spam
    # (load balance) sem mexer no bloco server.
    upstream spam_backend {
        server spam:8000;
    }

    server {
        listen 80;
        listen [::]:80;

        # logs simples em texto — na aula de logs a gente troca
        # para formato estruturado (JSON) e manda para o Loki.
        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log;

        location / {
            proxy_pass http://spam_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
